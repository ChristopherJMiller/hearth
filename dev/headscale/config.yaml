# Headscale configuration for local development.
# See https://headscale.net/ref/configuration/ for all options.

server_url: http://localhost:8085
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 0.0.0.0:9090

private_key_path: /var/lib/headscale/private.key

noise:
  private_key_path: /var/lib/headscale/noise_private.key

prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

derp:
  server:
    enabled: false
  urls:
    - https://controlplane.tailscale.com/derpmap/default

database:
  type: sqlite3
  sqlite:
    path: /var/lib/headscale/db.sqlite

dns:
  base_domain: hearth.local
  magic_dns: true
  nameservers:
    global:
      - 1.1.1.1
  # Split-DNS records that enrolled nodes (on the tailnet) resolve to reach
  # Hearth services by friendly name. Values are placeholders for local dev —
  # in a real Helm-based deployment these IPs would be rewritten to the actual
  # in-cluster service IPs (or a reverse-proxy ingress). For the QEMU-based
  # dev demo, the VM hits these names via /etc/hosts (10.0.2.2 → host Caddy),
  # not via headscale, so these records are primarily documentation of the
  # pattern.
  extra_records:
    - { name: "api.hearth.local",     type: "A", value: "100.64.0.1" }
    - { name: "cache.hearth.local",   type: "A", value: "100.64.0.1" }
    - { name: "kanidm.hearth.local",  type: "A", value: "100.64.0.1" }
    - { name: "chat.hearth.local",    type: "A", value: "100.64.0.1" }
    - { name: "cloud.hearth.local",   type: "A", value: "100.64.0.1" }
    - { name: "grafana.hearth.local", type: "A", value: "100.64.0.1" }

log:
  level: info

policy:
  mode: file
  path: ""
