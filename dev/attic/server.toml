# Attic server configuration for local development
#
# Uses SQLite (no PostgreSQL dependency) and local filesystem storage.
# NOT for production use — dev-only signing secret.

listen = "[::]:8080"

[database]
# SQLite for simplicity — no need for a separate database in dev
url = "sqlite:///var/lib/attic/server.db?mode=rwc"

[storage]
type = "local"
path = "/var/lib/attic/storage"

[compression]
type = "zstd"

[chunking]
# Use default chunking settings
nar-size-threshold = 65536
min-size = 16384
avg-size = 65536
max-size = 262144

# Dev-only token signing — DO NOT use in production.
# base64 of "hearth-dev-secret-do-not-use-in-production!!!!"
#
# hearth-api reads this same secret via HEARTH_ATTIC_TOKEN_SECRET (set in
# flake.nix devShell) to mint short-lived pull-only JWTs during enrollment.
# The two values MUST match — rotate them together.
[jwt.signing]
token-hs256-secret-base64 = "aGVhcnRoLWRldi1zZWNyZXQtZG8tbm90LXVzZS1pbi1wcm9kdWN0aW9uISEhIQ=="
