{{- if .Values.capabilities.cloud }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hearth-home.fullname" . }}-nextcloud
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "nextcloud") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "hearth-home.selectorLabels" (dict "context" . "component" "nextcloud") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/nextcloud/configmap.yaml") . | sha256sum }}
      {{- with .Values.nextcloud.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hearth-home.selectorLabels" (dict "context" . "component" "nextcloud") | nindent 8 }}
    spec:
      {{- include "hearth-home.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      containers:
        - name: nextcloud
          image: "{{ .Values.nextcloud.image.repository }}:{{ .Values.nextcloud.image.tag }}"
          imagePullPolicy: {{ .Values.nextcloud.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: POSTGRES_HOST
              value: {{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }}
            - name: POSTGRES_DB
              value: {{ .Values.nextcloud.database.name }}
            - name: POSTGRES_USER
              value: {{ .Values.nextcloud.database.user }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.fullname" . }}-nextcloud
                  key: db-password
            - name: NEXTCLOUD_ADMIN_USER
              value: {{ .Values.nextcloud.admin.user }}
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.fullname" . }}-nextcloud
                  key: admin-password
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "hearth-home.fullname" . }}-nextcloud
                  key: trusted-domains
            - name: OVERWRITECLIURL
              value: {{ .Values.nextcloud.config.serverUrl | quote }}
            - name: DEFAULT_PHONE_REGION
              value: {{ .Values.nextcloud.config.defaultPhoneRegion }}
            {{- if .Values.nextcloud.redis.enabled }}
            - name: REDIS_HOST
              value: localhost
            {{- end }}
          livenessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.nextcloud.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/www/html
        {{- if .Values.nextcloud.redis.enabled }}
        - name: redis
          image: "{{ .Values.nextcloud.redis.image.repository }}:{{ .Values.nextcloud.redis.image.tag }}"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.nextcloud.redis.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hearth-home.fullname" . }}-nextcloud-data
      {{- with .Values.nextcloud.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nextcloud.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nextcloud.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
