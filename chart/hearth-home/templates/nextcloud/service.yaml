{{- if .Values.capabilities.cloud }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hearth-home.fullname" . }}-nextcloud
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "nextcloud") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.nextcloud.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "hearth-home.selectorLabels" (dict "context" . "component" "nextcloud") | nindent 4 }}
{{- end }}
