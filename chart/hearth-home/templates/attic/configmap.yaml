apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hearth-home.fullname" . }}-attic
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "attic") | nindent 4 }}
data:
  server.toml: |
    listen = "[::]:8080"

    [database]
    url = "sqlite:///var/lib/attic/server.db?mode=rwc"

    [storage]
    type = "{{ .Values.attic.storage.type }}"
    {{- if eq .Values.attic.storage.type "local" }}
    path = "/var/lib/attic/storage"
    {{- else }}
    bucket = "{{ .Values.attic.storage.s3.bucket }}"
    region = "{{ .Values.attic.storage.s3.region }}"
    {{- if .Values.attic.storage.s3.endpoint }}
    endpoint = "{{ .Values.attic.storage.s3.endpoint }}"
    {{- end }}
    {{- end }}

    [compression]
    type = "{{ .Values.attic.config.compression }}"

    [chunking]
    nar-size-threshold = {{ .Values.attic.config.chunking.narSizeThreshold }}
    min-size = {{ .Values.attic.config.chunking.minSize }}
    avg-size = {{ .Values.attic.config.chunking.avgSize }}
    max-size = {{ .Values.attic.config.chunking.maxSize }}

    [jwt.signing]
    token-hs256-secret-base64 = "PLACEHOLDER"
