{{- if .Values.attic.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hearth-home.fullname" . }}-attic
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "attic") | nindent 4 }}
  {{- with .Values.attic.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.attic.ingress.className }}
  ingressClassName: {{ .Values.attic.ingress.className }}
  {{- end }}
  {{- if .Values.attic.ingress.tls }}
  tls:
    {{- range .Values.attic.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.attic.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths | default (list (dict "path" "/" "pathType" "Prefix")) }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "hearth-home.fullname" $ }}-attic
                port:
                  name: http
          {{- end }}
    {{- end }}
{{- end }}
