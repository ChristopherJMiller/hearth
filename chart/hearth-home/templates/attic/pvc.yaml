{{- if eq .Values.attic.storage.type "local" }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hearth-home.fullname" . }}-attic
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "attic") | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.attic.storage.local.size }}
{{- end }}
