{{- if .Values.capabilities.mesh }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "hearth-home.fullname" . }}-test-headscale
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "test") | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  containers:
    - name: test
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          wget -qO- --timeout=10 \
            "http://{{ include "hearth-home.fullname" . }}-headscale:{{ .Values.headscale.service.metricsPort }}/metrics" \
            && echo "Headscale health check passed"
  restartPolicy: Never
{{- end }}
