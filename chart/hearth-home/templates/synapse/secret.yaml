{{- if .Values.capabilities.chat }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hearth-home.fullname" . }}-synapse
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "synapse") | nindent 4 }}
type: Opaque
data:
  {{- /* Reuse existing secrets on upgrade to maintain stability */}}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-synapse" (include "hearth-home.fullname" .))) }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "registration-shared-secret") }}
  registration-shared-secret: {{ index $existingSecret.data "registration-shared-secret" }}
  {{- else }}
  registration-shared-secret: {{ randAlphaNum 48 | b64enc }}
  {{- end }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "bot-password") }}
  bot-password: {{ index $existingSecret.data "bot-password" }}
  {{- else }}
  bot-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
