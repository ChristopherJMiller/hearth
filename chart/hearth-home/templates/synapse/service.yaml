{{- if .Values.capabilities.chat }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hearth-home.fullname" . }}-synapse
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "synapse") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.synapse.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "hearth-home.selectorLabels" (dict "context" . "component" "synapse") | nindent 4 }}
{{- end }}
