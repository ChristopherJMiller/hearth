{{- if and .Values.capabilities.mail .Values.stalwart.hosted }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hearth-home.fullname" . }}-stalwart
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "stalwart") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.stalwart.service.port }}
      targetPort: http
      protocol: TCP
    - name: imap
      port: {{ .Values.stalwart.service.imapPort }}
      targetPort: imap
      protocol: TCP
    - name: smtp
      port: {{ .Values.stalwart.service.smtpPort }}
      targetPort: smtp
      protocol: TCP
  selector:
    {{- include "hearth-home.selectorLabels" (dict "context" . "component" "stalwart") | nindent 4 }}
{{- end }}
