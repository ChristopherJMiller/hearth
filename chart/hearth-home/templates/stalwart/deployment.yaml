{{- if and .Values.capabilities.mail .Values.stalwart.hosted }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hearth-home.fullname" . }}-stalwart
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "stalwart") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hearth-home.selectorLabels" (dict "context" . "component" "stalwart") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/stalwart/configmap.yaml") . | sha256sum }}
      {{- with .Values.stalwart.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hearth-home.selectorLabels" (dict "context" . "component" "stalwart") | nindent 8 }}
    spec:
      {{- include "hearth-home.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }} 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done']
        {{- if and .Values.capabilities.identity .Values.stalwart.oidc.enabled }}
        - name: inject-oidc-secret
          image: busybox:1.36
          command: ['sh', '-c', 'echo -n "$OIDC_CLIENT_SECRET" > /opt/stalwart/etc/oidc_client_secret']
          env:
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.stalwart.oidc.existingSecret }}{{ .Values.stalwart.oidc.existingSecret }}{{ else }}{{ include "hearth-home.fullname" . }}-kanidm-credentials{{ end }}
                  key: {{ .Values.stalwart.oidc.existingSecretKey | default "stalwart-oidc-secret" }}
          volumeMounts:
            - name: config-dir
              mountPath: /opt/stalwart/etc
        {{- end }}
      containers:
        - name: stalwart
          image: "{{ .Values.stalwart.image.repository }}:{{ .Values.stalwart.image.tag }}"
          imagePullPolicy: {{ .Values.stalwart.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: imap
              containerPort: 993
              protocol: TCP
            - name: smtp
              containerPort: 587
              protocol: TCP
          env:
            - name: STALWART_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.fullname" . }}-stalwart
                  key: db-password
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.stalwart.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/stalwart/etc/config.toml
              subPath: config.toml
              readOnly: true
            - name: config-dir
              mountPath: /opt/stalwart/etc/oidc_client_secret
              subPath: oidc_client_secret
              readOnly: true
            - name: data
              mountPath: /opt/stalwart/data
      volumes:
        - name: config
          configMap:
            name: {{ include "hearth-home.fullname" . }}-stalwart
        - name: config-dir
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "hearth-home.fullname" . }}-stalwart-data
      {{- with .Values.stalwart.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stalwart.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.stalwart.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
