{{- if and .Values.capabilities.mail .Values.stalwart.hosted }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hearth-home.fullname" . }}-stalwart
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "stalwart") | nindent 4 }}
type: Opaque
data:
  {{- /* Reuse existing secrets on upgrade to maintain stability */}}
  {{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace (printf "%s-stalwart" (include "hearth-home.fullname" .))) }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "db-password") }}
  db-password: {{ index $existingSecret.data "db-password" }}
  {{- else }}
  db-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if and $existingSecret $existingSecret.data (index $existingSecret.data "admin-password") }}
  admin-password: {{ index $existingSecret.data "admin-password" }}
  {{- else }}
  admin-password: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
