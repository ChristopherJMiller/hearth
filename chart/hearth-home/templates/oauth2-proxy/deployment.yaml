{{- if and .Values.capabilities.identity .Values.oauth2Proxy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hearth-home.fullname" . }}-oauth2-proxy
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "oauth2-proxy") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hearth-home.selectorLabels" (dict "context" . "component" "oauth2-proxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hearth-home.selectorLabels" (dict "context" . "component" "oauth2-proxy") | nindent 8 }}
      {{- with .Values.oauth2Proxy.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "hearth-home.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url={{ include "hearth-home.kanidmUrl" . }}/oauth2/openid/hearth-proxy
            - --client-id=hearth-proxy
            - --email-domain=*
            - --upstream=static://202
            - --reverse-proxy=true
            - --cookie-name={{ .Values.oauth2Proxy.cookie.name }}
            - --cookie-secure={{ .Values.oauth2Proxy.cookie.secure }}
            - --cookie-expire={{ .Values.oauth2Proxy.cookie.expire }}
            {{- if .Values.oauth2Proxy.cookie.domain }}
            - --cookie-domain={{ .Values.oauth2Proxy.cookie.domain }}
            {{- end }}
            - --skip-provider-button=true
            - --silence-ping-logging=true
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.oauth2Proxy.oidc.existingSecret }}{{ .Values.oauth2Proxy.oidc.existingSecret }}{{ else }}{{ include "hearth-home.fullname" . }}-kanidm-credentials{{ end }}
                  key: {{ .Values.oauth2Proxy.oidc.existingSecretKey | default "proxy-oidc-secret" }}
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.fullname" . }}-oauth2-proxy
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
      {{- with .Values.oauth2Proxy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth2Proxy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.oauth2Proxy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
