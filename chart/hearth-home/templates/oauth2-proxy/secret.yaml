{{- if and .Values.capabilities.identity .Values.oauth2Proxy.enabled }}
{{- $secretName := printf "%s-oauth2-proxy" (include "hearth-home.fullname" .) }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "oauth2-proxy") | nindent 4 }}
type: Opaque
data:
  {{- if $existingSecret }}
  cookie-secret: {{ index $existingSecret.data "cookie-secret" }}
  {{- else }}
  cookie-secret: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
