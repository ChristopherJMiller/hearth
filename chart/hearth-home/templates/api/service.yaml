apiVersion: v1
kind: Service
metadata:
  name: {{ include "hearth-home.fullname" . }}-api
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "hearth-home.selectorLabels" (dict "context" . "component" "api") | nindent 4 }}
