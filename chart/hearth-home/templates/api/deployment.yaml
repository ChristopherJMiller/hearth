apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hearth-home.fullname" . }}-api
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "hearth-home.selectorLabels" (dict "context" . "component" "api") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.api.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "hearth-home.selectorLabels" (dict "context" . "component" "api") | nindent 8 }}
    spec:
      {{- include "hearth-home.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "hearth-home.fullname" . }}-api
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ if .Values.postgresql.enabled }}{{ .Release.Name }}-postgresql{{ else }}{{ .Values.externalDatabase.host }}{{ end }} {{ if .Values.postgresql.enabled }}5432{{ else }}{{ .Values.externalDatabase.port | default 5432 }}{{ end }}; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "hearth-home.fullname" . }}-api
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.databaseSecretName" . }}
                  key: {{ include "hearth-home.databaseSecretKey" . }}
            - name: DATABASE_URL
              value: {{ include "hearth-home.databaseUrl" . }}
            - name: HEARTH_MACHINE_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.secretName" . }}
                  key: machine-token-secret
            - name: HEARTH_ATTIC_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "hearth-home.secretName" . }}
                  key: attic-token-secret
            {{- if and .Values.capabilities.mesh .Values.headscale.apiKey.existingSecret }}
            - name: HEADSCALE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.headscale.apiKey.existingSecret }}
                  key: {{ .Values.headscale.apiKey.existingSecretKey }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
