{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "hearth-home.secretName" . }}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) | default dict }}
{{- $existingData := $existingSecret.data | default dict }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
type: Opaque
data:
  machine-token-secret: {{ if .Values.secrets.machineTokenSecret }}{{ .Values.secrets.machineTokenSecret | b64enc }}{{ else }}{{ index $existingData "machine-token-secret" | default (randAlphaNum 32 | b64enc) }}{{ end }}
  attic-token-secret: {{ if .Values.secrets.atticTokenSecret }}{{ .Values.secrets.atticTokenSecret | b64enc }}{{ else }}{{ index $existingData "attic-token-secret" | default (randAlphaNum 32 | b64enc) }}{{ end }}
{{- end }}
