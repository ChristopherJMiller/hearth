apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "hearth-home.fullname" . }}-api
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "api") | nindent 4 }}
data:
  LOG_FORMAT: {{ .Values.api.config.logFormat | quote }}
  RUST_LOG: {{ .Values.api.config.rustLog | quote }}
  HEARTH_WEB_DIST: {{ .Values.api.config.webDistPath | quote }}
  HEARTH_IDENTITY_SYNC_INTERVAL_SECS: {{ .Values.api.config.identitySyncIntervalSecs | quote }}
  HEARTH_FLAKE_REF: {{ .Values.api.config.flakeRef | quote }}
  HEARTH_ATTIC_SERVER: {{ include "hearth-home.atticUrl" . | quote }}
  HEARTH_ATTIC_CACHE: {{ .Values.attic.config.cacheName | quote }}
  {{- if and .Values.api.ingress.enabled .Values.api.ingress.hosts }}
  HEARTH_SERVER_URL: "https://{{ (index .Values.api.ingress.hosts 0).host }}"
  {{- else }}
  HEARTH_SERVER_URL: {{ include "hearth-home.apiUrl" . | quote }}
  {{- end }}
  {{- if .Values.capabilities.identity }}
  KANIDM_OIDC_ISSUER: "{{ include "hearth-home.kanidmUrl" . }}/oauth2/openid/hearth-console"
  KANIDM_OIDC_AUDIENCE: "hearth-console,hearth-enrollment"
  HEARTH_KANIDM_URL: {{ include "hearth-home.kanidmUrl" . | quote }}
  {{- end }}
  {{- if .Values.capabilities.mesh }}
  HEADSCALE_URL: {{ include "hearth-home.headscaleUrl" . | quote }}
  {{- end }}
  {{- if .Values.capabilities.builds }}
  HEARTH_BINARY_CACHE_URL: {{ include "hearth-home.atticUrl" . | quote }}
  {{- end }}
  {{- if .Values.capabilities.chat }}
  {{- if and .Values.synapse.ingress.enabled .Values.synapse.ingress.hosts }}
  HEARTH_CHAT_URL: "https://{{ (index .Values.synapse.ingress.hosts 0).host }}"
  {{- else }}
  HEARTH_CHAT_URL: {{ include "hearth-home.synapseUrl" . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.capabilities.cloud }}
  {{- if and .Values.nextcloud.ingress.enabled .Values.nextcloud.ingress.hosts }}
  HEARTH_CLOUD_URL: "https://{{ (index .Values.nextcloud.ingress.hosts 0).host }}"
  {{- else }}
  HEARTH_CLOUD_URL: {{ include "hearth-home.nextcloudUrl" . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.capabilities.identity }}
  {{- if and .Values.kanidm.ingress.enabled .Values.kanidm.ingress.hosts }}
  HEARTH_IDENTITY_URL: "https://{{ (index .Values.kanidm.ingress.hosts 0).host }}"
  {{- else }}
  HEARTH_IDENTITY_URL: {{ include "hearth-home.kanidmUrl" . | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.capabilities.observability }}
  {{- if and .Values.grafana.ingress.enabled .Values.grafana.ingress.hosts }}
  HEARTH_GRAFANA_URL: "https://{{ (index .Values.grafana.ingress.hosts 0).host }}"
  {{- end }}
  {{- end }}
  {{- if .Values.capabilities.mail }}
  {{- if .Values.stalwart.hosted }}
  {{- if and .Values.stalwart.ingress.enabled .Values.stalwart.ingress.hosts }}
  HEARTH_MAIL_URL: "https://{{ (index .Values.stalwart.ingress.hosts 0).host }}"
  {{- else }}
  HEARTH_MAIL_URL: {{ include "hearth-home.stalwartUrl" . | quote }}
  {{- end }}
  HEARTH_MAIL_IMAP_HOST: {{ .Values.stalwart.config.hostname | quote }}
  HEARTH_MAIL_SMTP_HOST: {{ .Values.stalwart.config.hostname | quote }}
  HEARTH_MAIL_DOMAIN: {{ .Values.stalwart.config.domain | quote }}
  {{- else }}
  HEARTH_MAIL_IMAP_HOST: {{ .Values.stalwart.externalMail.imapHost | quote }}
  HEARTH_MAIL_SMTP_HOST: {{ .Values.stalwart.externalMail.smtpHost | quote }}
  HEARTH_MAIL_DOMAIN: {{ .Values.stalwart.externalMail.domain | quote }}
  {{- end }}
  {{- end }}
