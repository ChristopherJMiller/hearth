{{- if and .Values.certManager.enabled (ne .Values.certManager.issuer.type "existing") }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "hearth-home.fullname" . }}-issuer
  labels:
    {{- include "hearth-home.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.certManager.issuer.type "selfSigned" }}
  selfSigned: {}
  {{- else if eq .Values.certManager.issuer.type "acme" }}
  acme:
    server: {{ .Values.certManager.issuer.acme.server }}
    email: {{ required "certManager.issuer.acme.email is required when issuer.type=acme" .Values.certManager.issuer.acme.email }}
    privateKeySecretRef:
      name: {{ include "hearth-home.fullname" . }}-acme-key
    solvers:
      {{- if eq .Values.certManager.issuer.acme.solver "http01" }}
      - http01:
          ingress:
            class: {{ .Values.certManager.issuer.acme.ingressClass }}
      {{- else if eq .Values.certManager.issuer.acme.solver "dns01" }}
      - dns01:
          {{- toYaml .Values.certManager.issuer.acme.dns01 | nindent 12 }}
      {{- else }}
      {{- fail (printf "certManager.issuer.acme.solver must be 'http01' or 'dns01', got: %s" .Values.certManager.issuer.acme.solver) }}
      {{- end }}
  {{- else }}
  {{- fail (printf "certManager.issuer.type must be one of: selfSigned, acme, existing. got: %s" .Values.certManager.issuer.type) }}
  {{- end }}
{{- end }}
