{{- if .Values.capabilities.identity }}
{{- if and (not .Values.kanidm.tls.existingSecret) (not .Values.certManager.enabled) }}
{{- /* When cert-manager is enabled, templates/kanidm/certificate.yaml
       creates a Certificate resource that populates this same Secret —
       we skip the built-in genSelfSignedCert path. */ -}}
{{- $secretName := printf "%s-kanidm-tls" (include "hearth-home.fullname" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "kanidm") | nindent 4 }}
type: kubernetes.io/tls
{{- if .Values.kanidm.tls.selfSigned }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- if $existingSecret }}
data:
  tls.crt: {{ index $existingSecret.data "tls.crt" }}
  tls.key: {{ index $existingSecret.data "tls.key" }}
{{- else }}
{{- $cn := .Values.kanidm.config.domain }}
{{- $cert := genSelfSignedCert $cn nil (list $cn) 3650 }}
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
