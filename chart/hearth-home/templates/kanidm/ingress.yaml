{{- if .Values.capabilities.identity }}
{{- if .Values.kanidm.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "hearth-home.fullname" . }}-kanidm
  labels:
    {{- include "hearth-home.componentLabels" (dict "context" . "component" "kanidm") | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    {{- with .Values.kanidm.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.kanidm.ingress.className }}
  ingressClassName: {{ .Values.kanidm.ingress.className }}
  {{- end }}
  {{- if .Values.kanidm.ingress.tls }}
  tls:
    {{- range .Values.kanidm.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.kanidm.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "hearth-home.fullname" $ }}-kanidm
                port:
                  name: https
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
