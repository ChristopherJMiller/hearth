# ============================================================
# Global settings
# ============================================================
global:
  imagePullSecrets: []
  storageClass: ""

nameOverride: ""
fullnameOverride: ""

# ============================================================
# Capabilities toggles
# ============================================================
capabilities:
  identity: true        # Kanidm — OIDC identity provider, PAM/NSS
  mesh: true            # Headscale — WireGuard mesh VPN coordinator
  builds: true          # hearth-build-worker(s)
  chat: false           # Matrix/Synapse — corporate internal chat
  cloud: false          # Nextcloud — cloud storage & collaboration
  mail: false           # Mail — enable mail capability (see stalwart section for hosted vs external)
  observability: false  # Grafana + Loki + Prometheus subcharts

# ============================================================
# cert-manager integration (optional)
# ============================================================
# When enabled, Hearth uses cert-manager to issue and renew TLS certificates
# instead of Helm's built-in genSelfSignedCert. Requires cert-manager to be
# installed in the cluster: https://cert-manager.io/docs/installation/
#
# Leave disabled to use the built-in self-signed path (good for local dev
# and air-gapped clusters). For BYO certs, use the per-component
# `*.tls.existingSecret` fields and leave certManager disabled.
#
# See docs/DEPLOYMENT.md for the full deployment playbook.
certManager:
  enabled: false

  # Issuer configuration. One of: selfSigned, acme, existing
  issuer:
    type: selfSigned

    # For type=acme — creates an ACME ClusterIssuer (Let's Encrypt by default)
    acme:
      server: https://acme-v02.api.letsencrypt.org/directory
      email: admin@example.com
      # Solver: http01 or dns01
      solver: http01
      # For http01: the ingress class that will serve the challenge
      ingressClass: nginx
      # For dns01: the cert-manager dns01 solver config (verbatim)
      dns01: {}

    # For type=existing — reference an Issuer/ClusterIssuer already in the cluster
    existing:
      name: ""
      kind: ClusterIssuer  # or Issuer

# ============================================================
# hearth-api (always deployed)
# ============================================================
api:
  image:
    repository: ghcr.io/your-org/hearth-api
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  config:
    logFormat: json
    rustLog: "hearth_api=info,tower_http=debug"
    webDistPath: /app/web
    identitySyncIntervalSecs: "300"
    flakeRef: "github:myorg/fleet-config"

  service:
    type: ClusterIP
    port: 3000

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: hearth.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 5
    targetCPUPercent: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  serviceAccount:
    create: true
    annotations: {}

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Secrets
# ============================================================
secrets:
  # Provide an existing Secret name containing all hearth secrets.
  # Expected keys: machine-token-secret, attic-token-secret
  existingSecret: ""

  # Inline values (used only if existingSecret is empty).
  # Leave empty to auto-generate random values on first install.
  machineTokenSecret: ""
  atticTokenSecret: ""

# ============================================================
# PostgreSQL (Bitnami subchart)
# ============================================================
postgresql:
  enabled: true
  auth:
    username: hearth
    password: ""       # auto-generated if empty
    database: hearth
    existingSecret: ""
  primary:
    persistence:
      size: 20Gi

# External database (used when postgresql.enabled=false)
externalDatabase:
  host: ""
  port: 5432
  user: hearth
  password: ""
  database: hearth
  existingSecret: ""
  existingSecretPasswordKey: password

# ============================================================
# Attic binary cache (always deployed)
# ============================================================
attic:
  image:
    repository: ghcr.io/zhaofengli/attic
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  service:
    port: 8080

  config:
    cacheName: hearth
    compression: zstd
    chunking:
      narSizeThreshold: 65536
      minSize: 16384
      avgSize: 65536
      maxSize: 262144

  storage:
    type: local
    local:
      size: 50Gi
    s3:
      bucket: ""
      region: ""
      endpoint: ""
      credentialsSecret: ""

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Kanidm (conditional on capabilities.identity)
# ============================================================
kanidm:
  image:
    repository: kanidm/server
    tag: "1.9.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    port: 8443

  config:
    domain: kanidm.hearth.local
    origin: "https://kanidm.hearth.local:8443"
    logLevel: info
    trustXForwardFor: true

  tls:
    # Generate a self-signed cert (for dev/internal)
    selfSigned: true
    # Or reference an existing Secret with tls.crt and tls.key
    existingSecret: ""

  persistence:
    size: 5Gi

  bootstrap:
    enabled: true
    image:
      repository: bitnami/kubectl
      tag: latest
      pullPolicy: IfNotPresent
    groups:
      - hearth-users
      - hearth-admins
      - hearth-developers
      - hearth-designers
    oauth2Clients:
      - name: hearth-console
        displayName: "Hearth Admin Console"
        public: true
        scopes:
          - openid
          - profile
          - email
          - groups
      - name: hearth-enrollment
        displayName: "Hearth Device Enrollment"
        public: true
        scopes:
          - openid
          - profile
          - groups

  ingress:
    enabled: true
    className: ""
    annotations: {}
    # NOTE: nginx.ingress.kubernetes.io/backend-protocol: "HTTPS" is always
    # added by the template — no need to duplicate it here.
    hosts:
      - host: kanidm.hearth.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Headscale (conditional on capabilities.mesh)
# ============================================================
headscale:
  image:
    repository: headscale/headscale
    tag: "0.23"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  service:
    port: 8080
    metricsPort: 9090

  config:
    serverUrl: "https://headscale.hearth.local"
    baseDomain: hearth.local
    magicDns: true
    prefixes:
      v4: "100.64.0.0/10"
      v6: "fd7a:115c:a1e0::/48"
    derp:
      serverEnabled: false
      urls:
        - https://controlplane.tailscale.com/derpmap/default
    logLevel: info

  # Headscale API key — used by hearth-api for mesh operations.
  # Provide via existingSecret or generate manually after install.
  apiKey:
    existingSecret: ""
    existingSecretKey: api-key

  persistence:
    size: 2Gi

  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Build Worker (conditional on capabilities.builds)
# ============================================================
buildWorker:
  image:
    repository: ghcr.io/your-org/hearth-build-worker
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi

  config:
    pollIntervalSecs: "5"
    logFormat: json
    rustLog: "hearth_build_worker=info"
    atticCache: hearth
    sbomDir: /var/lib/hearth/sboms
    flakeRef: "github:myorg/fleet-config"

  scratch:
    type: emptyDir
    emptyDir:
      sizeLimit: 50Gi
    pvc:
      size: 100Gi
      storageClass: ""

  nixStore:
    enabled: true
    size: 50Gi
    storageClass: ""

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Synapse Matrix Chat (conditional on capabilities.chat)
# ============================================================
synapse:
  image:
    repository: matrixdotorg/synapse
    tag: "v1.122.0"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  service:
    port: 8008

  config:
    serverName: "chat.hearth.example.com"
    publicBaseUrl: "https://chat.hearth.example.com"
    enableRegistration: false
    logLevel: INFO
    reportStats: false
    autoJoinRooms:
      - "#general"
      - "#random"

  # OIDC via Kanidm (requires capabilities.identity=true)
  oidc:
    enabled: true
    idpName: "Hearth Identity"
    skipVerification: false
    existingSecret: ""
    existingSecretKey: "matrix-oidc-secret"

  # Database — separate DB on the shared PostgreSQL instance
  database:
    name: synapse
    user: synapse
    existingSecret: ""
    existingSecretPasswordKey: synapse-db-password

  persistence:
    mediaStore:
      size: 20Gi

  bootstrap:
    enabled: true
    defaultRooms:
      - alias: general
        name: General
        topic: "Company-wide announcements and discussion"
      - alias: random
        name: Random
        topic: "Off-topic chat and social"
      - alias: it-support
        name: IT Support
        topic: "IT help desk — ask questions, report issues"

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: chat.hearth.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Nextcloud Cloud Storage (conditional on capabilities.cloud)
# ============================================================
nextcloud:
  image:
    repository: nextcloud
    tag: "30-apache"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  service:
    port: 80

  config:
    serverUrl: "https://cloud.hearth.example.com"
    defaultPhoneRegion: "US"
    maxUploadSize: "16G"

  # OIDC via Kanidm (requires capabilities.identity=true)
  oidc:
    enabled: true
    providerName: "Hearth Identity"
    existingSecret: ""
    existingSecretKey: "nextcloud-oidc-secret"

  # Database — separate DB on the shared PostgreSQL instance
  database:
    name: nextcloud
    user: nextcloud
    existingSecret: ""
    existingSecretPasswordKey: nextcloud-db-password

  # Redis sidecar for session caching and file locking
  redis:
    enabled: true
    image:
      repository: redis
      tag: "7-alpine"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  admin:
    user: admin
    existingSecret: ""
    existingSecretPasswordKey: nextcloud-admin-password

  persistence:
    data:
      size: 50Gi

  bootstrap:
    enabled: true
    image:
      repository: bitnami/kubectl
      tag: "1.31"
      pullPolicy: IfNotPresent
    defaultFolders:
      - Documents
      - Projects
      - Shared
    sharedCalendars:
      - id: company-holidays
        name: "Company Holidays"
      - id: all-hands
        name: "All-Hands & Company Events"

  ingress:
    enabled: true
    className: ""
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "16G"
    hosts:
      - host: cloud.hearth.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Mail (conditional on capabilities.mail)
#
# Two modes:
#   hosted: true  → deploy Stalwart Mail Server in-cluster
#   hosted: false → point Thunderbird at an external IMAP/SMTP server
# ============================================================
stalwart:
  # When hosted=true, Stalwart is deployed as a Helm workload.
  # When hosted=false, only externalMail settings are used (no pods created).
  hosted: true

  # External mail server — used when hosted=false.
  # These are passed to fleet devices for Thunderbird autoconfig.
  externalMail:
    imapHost: ""
    smtpHost: ""
    domain: ""

  image:
    repository: stalwartlabs/mail-server
    tag: "v0.10"
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    port: 8080        # HTTP admin / JMAP
    imapPort: 993
    smtpPort: 587

  config:
    hostname: "mail.hearth.example.com"
    domain: "hearth.example.com"

  # OIDC via Kanidm (requires capabilities.identity=true)
  oidc:
    enabled: true
    existingSecret: ""
    existingSecretKey: "stalwart-oidc-secret"

  # Database — separate DB on the shared PostgreSQL instance
  database:
    name: stalwart
    user: stalwart

  persistence:
    size: 10Gi

  bootstrap:
    enabled: true

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: mail.hearth.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# oauth2-proxy (forward-auth for services without native OIDC)
# Only deployed when capabilities.identity=true
# ============================================================
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: "v7.7.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  service:
    port: 4180
  # Cookie settings
  cookie:
    name: "_hearth_oauth2"
    secure: true
    # Set to your base domain for cross-subdomain SSO (e.g., ".hearth.example.com")
    domain: ""
    expire: "168h"
  # Custom OIDC client — auto-created by Kanidm bootstrap
  oidc:
    existingSecret: ""
    existingSecretKey: "proxy-oidc-secret"
  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ============================================================
# Observability subchart overrides
# (only applied when capabilities.observability=true)
# ============================================================
grafana:
  adminPassword: ""
  persistence:
    enabled: true
    size: 5Gi
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          access: proxy

loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
  test:
    enabled: false

prometheus:
  server:
    persistentVolume:
      size: 20Gi
