suite: Capabilities toggles
release:
  name: hearth
  namespace: default
tests:
  # ── Identity (Kanidm) ──────────────────────────────────────
  - it: should render Kanidm StatefulSet when identity enabled (default)
    template: kanidm/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - matchRegex:
          path: metadata.name
          pattern: "-kanidm$"

  - it: should not render Kanidm StatefulSet when identity disabled
    template: kanidm/statefulset.yaml
    set:
      capabilities.identity: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Kanidm Service when identity disabled
    template: kanidm/service.yaml
    set:
      capabilities.identity: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Mesh (Headscale) ───────────────────────────────────────
  - it: should render Headscale Deployment when mesh enabled (default)
    template: headscale/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-headscale$"

  - it: should not render Headscale Deployment when mesh disabled
    template: headscale/deployment.yaml
    set:
      capabilities.mesh: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Headscale Service when mesh disabled
    template: headscale/service.yaml
    set:
      capabilities.mesh: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Headscale PVC when mesh disabled
    template: headscale/pvc.yaml
    set:
      capabilities.mesh: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Builds (build-worker) ──────────────────────────────────
  - it: should render build-worker Deployment when builds enabled (default)
    template: build-worker/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-build-worker$"

  - it: should not render build-worker when builds disabled
    template: build-worker/deployment.yaml
    set:
      capabilities.builds: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct worker replicas
    template: build-worker/deployment.yaml
    set:
      buildWorker.replicas: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  # ── Chat (Synapse) ────────────────────────────────────────
  - it: should render Synapse Deployment when chat enabled
    template: synapse/deployment.yaml
    set:
      capabilities.chat: true
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-synapse$"

  - it: should not render Synapse Deployment when chat disabled (default)
    template: synapse/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Synapse Service when chat disabled
    template: synapse/service.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Synapse PVC when chat disabled
    template: synapse/pvc.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── Cloud (Nextcloud) ─────────────────────────────────────
  - it: should render Nextcloud Deployment when cloud enabled
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-nextcloud$"

  - it: should not render Nextcloud Deployment when cloud disabled (default)
    template: nextcloud/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Nextcloud Service when cloud disabled
    template: nextcloud/service.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Nextcloud PVC when cloud disabled
    template: nextcloud/pvc.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── Mail (Stalwart) ──────────────────────────────────────
  - it: should render Stalwart Deployment when mail enabled and hosted
    template: stalwart/deployment.yaml
    set:
      capabilities.mail: true
      stalwart.hosted: true
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-stalwart$"

  - it: should not render Stalwart Deployment when mail disabled (default)
    template: stalwart/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Stalwart when mail enabled but not hosted (external)
    template: stalwart/deployment.yaml
    set:
      capabilities.mail: true
      stalwart.hosted: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Stalwart Service when mail not hosted
    template: stalwart/service.yaml
    set:
      capabilities.mail: true
      stalwart.hosted: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Stalwart PVC when mail not hosted
    template: stalwart/pvc.yaml
    set:
      capabilities.mail: true
      stalwart.hosted: false
    asserts:
      - hasDocuments:
          count: 0

  # ── oauth2-proxy ──────────────────────────────────────────
  - it: should render oauth2-proxy Deployment when identity enabled (default)
    template: oauth2-proxy/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-oauth2-proxy$"

  - it: should not render oauth2-proxy when identity disabled
    template: oauth2-proxy/deployment.yaml
    set:
      capabilities.identity: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render oauth2-proxy Service when identity disabled
    template: oauth2-proxy/service.yaml
    set:
      capabilities.identity: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render oauth2-proxy when explicitly disabled
    template: oauth2-proxy/deployment.yaml
    set:
      capabilities.identity: true
      oauth2Proxy.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  # ── Observability ──────────────────────────────────────────
  - it: should not render ServiceMonitor when observability disabled (default)
    template: observability/servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceMonitors when observability enabled
    template: observability/servicemonitor.yaml
    set:
      capabilities.observability: true
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: ServiceMonitor
        documentIndex: 0
      - isKind:
          of: ServiceMonitor
        documentIndex: 1

  - it: should render only API ServiceMonitor when observability enabled but mesh disabled
    template: observability/servicemonitor.yaml
    set:
      capabilities.observability: true
      capabilities.mesh: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor

  - it: should not render API ServiceMonitor when observability disabled
    template: api/servicemonitor.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render API ServiceMonitor when observability enabled
    template: api/servicemonitor.yaml
    set:
      capabilities.observability: true
    asserts:
      - isKind:
          of: ServiceMonitor
