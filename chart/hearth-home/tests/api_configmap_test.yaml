suite: API ConfigMap
templates:
  - api/configmap.yaml
release:
  name: hearth
  namespace: default
tests:
  - it: should include base config values
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: data.LOG_FORMAT
          value: "json"
      - equal:
          path: data.RUST_LOG
          value: "hearth_api=info,tower_http=debug"
      - equal:
          path: data.HEARTH_WEB_DIST
          value: /app/web
      - isNotEmpty:
          path: data.HEARTH_ATTIC_SERVER
      - isNotEmpty:
          path: data.HEARTH_ATTIC_CACHE

  - it: should include Kanidm env vars when identity enabled
    set:
      capabilities.identity: true
    asserts:
      - isNotEmpty:
          path: data.KANIDM_OIDC_ISSUER
      - isNotEmpty:
          path: data.KANIDM_OIDC_AUDIENCE
      - isNotEmpty:
          path: data.HEARTH_KANIDM_URL

  - it: should not include Kanidm env vars when identity disabled
    set:
      capabilities.identity: false
    asserts:
      - notExists:
          path: data.KANIDM_OIDC_ISSUER
      - notExists:
          path: data.KANIDM_OIDC_AUDIENCE
      - notExists:
          path: data.HEARTH_KANIDM_URL

  - it: should include HEADSCALE_URL when mesh enabled
    set:
      capabilities.mesh: true
    asserts:
      - isNotEmpty:
          path: data.HEADSCALE_URL

  - it: should not include HEADSCALE_URL when mesh disabled
    set:
      capabilities.mesh: false
    asserts:
      - notExists:
          path: data.HEADSCALE_URL

  - it: should include HEARTH_BINARY_CACHE_URL when builds enabled
    set:
      capabilities.builds: true
    asserts:
      - isNotEmpty:
          path: data.HEARTH_BINARY_CACHE_URL

  - it: should not include HEARTH_BINARY_CACHE_URL when builds disabled
    set:
      capabilities.builds: false
    asserts:
      - notExists:
          path: data.HEARTH_BINARY_CACHE_URL

  - it: should use ingress host for HEARTH_SERVER_URL when ingress enabled
    # default values already have api.ingress.enabled=true and hosts[0].host=hearth.example.com
    asserts:
      - equal:
          path: data.HEARTH_SERVER_URL
          value: "https://hearth.example.com"

  - it: should use internal URL when ingress disabled
    set:
      api.ingress.enabled: false
    asserts:
      - matchRegex:
          path: data.HEARTH_SERVER_URL
          pattern: "-api:"

  # ── Service discovery env vars ─────────────────────────────
  - it: should include HEARTH_CHAT_URL when chat enabled with ingress
    set:
      capabilities.chat: true
      synapse.ingress.enabled: true
      synapse.ingress.hosts:
        - host: chat.hearth.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: data.HEARTH_CHAT_URL
          value: "https://chat.hearth.example.com"

  - it: should not include HEARTH_CHAT_URL when chat disabled
    set:
      capabilities.chat: false
    asserts:
      - notExists:
          path: data.HEARTH_CHAT_URL

  - it: should include HEARTH_CLOUD_URL when cloud enabled with ingress
    set:
      capabilities.cloud: true
      nextcloud.ingress.enabled: true
      nextcloud.ingress.hosts:
        - host: cloud.hearth.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: data.HEARTH_CLOUD_URL
          value: "https://cloud.hearth.example.com"

  - it: should not include HEARTH_CLOUD_URL when cloud disabled
    set:
      capabilities.cloud: false
    asserts:
      - notExists:
          path: data.HEARTH_CLOUD_URL

  - it: should include HEARTH_IDENTITY_URL when identity enabled with ingress
    set:
      capabilities.identity: true
      kanidm.ingress.enabled: true
      kanidm.ingress.hosts:
        - host: id.hearth.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: data.HEARTH_IDENTITY_URL
          value: "https://id.hearth.example.com"

  - it: should not include HEARTH_IDENTITY_URL when identity disabled
    set:
      capabilities.identity: false
    asserts:
      - notExists:
          path: data.HEARTH_IDENTITY_URL
