suite: Nextcloud
release:
  name: hearth
  namespace: default
tests:
  # ── Deployment ────────────────────────────────────────────
  - it: should render Nextcloud Deployment when cloud enabled
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: Deployment
      - matchRegex:
          path: metadata.name
          pattern: "-nextcloud$"

  - it: should not render Nextcloud Deployment when cloud disabled (default)
    template: nextcloud/deployment.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should set correct image
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
      nextcloud.image.tag: "29-apache"
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "nextcloud:29-apache"

  - it: should include health probes on /status.php
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /status.php
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /status.php

  - it: should include Redis sidecar when enabled
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
      nextcloud.redis.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: redis
      - matchRegex:
          path: spec.template.spec.containers[1].image
          pattern: "redis:7-alpine"

  - it: should not include Redis sidecar when disabled
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
      nextcloud.redis.enabled: false
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should use Recreate strategy
    template: nextcloud/deployment.yaml
    set:
      capabilities.cloud: true
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  # ── Service ───────────────────────────────────────────────
  - it: should render Nextcloud Service when cloud enabled
    template: nextcloud/service.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 80

  - it: should not render Nextcloud Service when cloud disabled
    template: nextcloud/service.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── ConfigMap ─────────────────────────────────────────────
  - it: should render ConfigMap when cloud enabled
    template: nextcloud/configmap.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: ConfigMap
      - matchRegex:
          path: metadata.name
          pattern: "-nextcloud$"

  - it: should not render ConfigMap when cloud disabled
    template: nextcloud/configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should include server URL in ConfigMap
    template: nextcloud/configmap.yaml
    set:
      capabilities.cloud: true
      nextcloud.config.serverUrl: "https://cloud.myorg.com"
    asserts:
      - equal:
          path: data.server-url
          value: "https://cloud.myorg.com"

  # ── Secret ──────────────────────────────────────────────
  - it: should render Secret when cloud enabled
    template: nextcloud/secret.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: Secret
      - exists:
          path: data.admin-password
      - exists:
          path: data.db-password

  - it: should not render Secret when cloud disabled
    template: nextcloud/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  # ── PVC ──────────────────────────────────────────────────
  - it: should render PVC when cloud enabled
    template: nextcloud/pvc.yaml
    set:
      capabilities.cloud: true
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: should not render PVC when cloud disabled
    template: nextcloud/pvc.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom PVC size
    template: nextcloud/pvc.yaml
    set:
      capabilities.cloud: true
      nextcloud.persistence.data.size: 100Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 100Gi

  # ── Ingress ──────────────────────────────────────────────
  - it: should render Ingress when cloud and ingress enabled
    template: nextcloud/ingress.yaml
    set:
      capabilities.cloud: true
      nextcloud.ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - matchRegex:
          path: metadata.name
          pattern: "-nextcloud$"

  - it: should not render Ingress when cloud disabled
    template: nextcloud/ingress.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render Ingress when ingress disabled
    template: nextcloud/ingress.yaml
    set:
      capabilities.cloud: true
      nextcloud.ingress.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should include proxy-body-size annotation
    template: nextcloud/ingress.yaml
    set:
      capabilities.cloud: true
      nextcloud.ingress.enabled: true
    asserts:
      - equal:
          path: metadata.annotations["nginx.ingress.kubernetes.io/proxy-body-size"]
          value: "16G"

  # ── Bootstrap Job ────────────────────────────────────────
  - it: should render bootstrap Job when cloud and bootstrap enabled
    template: nextcloud/job-bootstrap.yaml
    set:
      capabilities.cloud: true
      nextcloud.bootstrap.enabled: true
    asserts:
      - isKind:
          of: Job
      - equal:
          path: metadata.annotations["helm.sh/hook"]
          value: post-install
      - equal:
          path: metadata.annotations["helm.sh/hook-weight"]
          value: "25"

  - it: should not render bootstrap Job when cloud disabled
    template: nextcloud/job-bootstrap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render bootstrap Job when bootstrap disabled
    template: nextcloud/job-bootstrap.yaml
    set:
      capabilities.cloud: true
      nextcloud.bootstrap.enabled: false
    asserts:
      - hasDocuments:
          count: 0
