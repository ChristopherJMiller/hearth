suite: API Service
templates:
  - api/service.yaml
release:
  name: hearth
  namespace: default
tests:
  - it: should render a ClusterIP Service
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: hearth-hearth-home-api
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should use the configured port
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 3000
      - equal:
          path: spec.ports[0].targetPort
          value: http
      - equal:
          path: spec.ports[0].name
          value: http

  - it: should use a custom port when overridden
    set:
      api.service.port: 8080
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 8080
