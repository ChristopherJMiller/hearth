suite: Secrets Management
templates:
  - api/secret.yaml
release:
  name: hearth
  namespace: default
tests:
  - it: should create Secret when no existingSecret is set
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque

  - it: should contain machine-token-secret and attic-token-secret keys
    asserts:
      - isNotNull:
          path: data["machine-token-secret"]
      - isNotNull:
          path: data["attic-token-secret"]

  - it: should not create Secret when existingSecret is provided
    set:
      secrets.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should use provided machineTokenSecret value
    set:
      secrets.machineTokenSecret: my-custom-secret
    asserts:
      - isNotNull:
          path: data["machine-token-secret"]
      - isKind:
          of: Secret

  - it: should use provided atticTokenSecret value
    set:
      secrets.atticTokenSecret: my-attic-secret
    asserts:
      - isNotNull:
          path: data["attic-token-secret"]
      - isKind:
          of: Secret
