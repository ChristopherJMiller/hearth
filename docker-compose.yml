services:
  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: hearth
      POSTGRES_PASSWORD: hearth
      POSTGRES_DB: hearth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth"]
      interval: 5s
      timeout: 5s
      retries: 5

  attic:
    image: ghcr.io/zhaofengli/attic:latest
    command: ["-f", "/etc/attic/server.toml"]
    ports: ["8080:8080"]
    volumes:
      - ./dev/attic/server.toml:/etc/attic/server.toml:ro
      - attic-data:/var/lib/attic
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 5

  kanidm:
    image: kanidm/server:latest
    ports: ["8443:8443"]
    volumes:
      - ./dev/kanidm/server.toml:/data/server.toml:ro
      - kanidm-data:/data/db
    healthcheck:
      test: ["CMD", "curl", "-sf", "--insecure", "https://localhost:8443/status"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.0.0
    ports: ["3100:3100"]
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports: ["3001:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana:/etc/grafana/provisioning/dashboards

volumes:
  pgdata:
  attic-data:
  kanidm-data:
  loki-data:
  grafana-data:
