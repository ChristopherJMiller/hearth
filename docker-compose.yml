services:
  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: hearth
      POSTGRES_PASSWORD: hearth
      POSTGRES_DB: hearth
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth"]
      interval: 5s
      timeout: 5s
      retries: 5

  attic:
    image: ghcr.io/zhaofengli/attic:latest
    command: ["-f", "/etc/attic/server.toml"]
    ports: ["8080:8080"]
    volumes:
      - ./dev/attic/server.toml:/etc/attic/server.toml:ro
      - attic-data:/var/lib/attic
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 5

  kanidm:
    image: ghcr.io/kanidm/server:latest
    ports: ["8443:8443"]
    volumes:
      - ./dev/kanidm/server.toml:/data/server.toml:ro
      - kanidm-data:/data/db
    healthcheck:
      test: ["CMD", "curl", "-sf", "--insecure", "https://localhost:8443/status"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  attic-data:
  kanidm-data:
